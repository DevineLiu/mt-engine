name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-and-fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy
    - name: Check formatting
      run: cargo fmt --all -- --check

  matrix-check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features: ["snapshot,serde", "dense-node,serde"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: clippy
    - name: Matrix Lint (Clippy)
      run: |
        cd mt-engine-core
        cargo clippy --all-targets --features "${{ matrix.features }}" -- -D warnings
    - name: Matrix Test
      run: |
        cd mt-engine-core
        cargo test --features "${{ matrix.features }}"
